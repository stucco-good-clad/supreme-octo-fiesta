name: CDN Seeder (C++)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'cpp_seeder/**'

jobs:
  seed:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libssl-dev \
            libboost-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cpp_seeder/libcdn_fetch/target
          key: cargo-${{ runner.os }}-${{ hashFiles('cpp_seeder/libcdn_fetch/Cargo.lock') }}

      - name: Cache cmake build
        uses: actions/cache@v4
        with:
          path: cpp_seeder/build
          key: cmake-${{ runner.os }}-${{ hashFiles('cpp_seeder/CMakeLists.txt', 'cpp_seeder/cdn_seed.cpp', 'cpp_seeder/cdn_disk_interface.cpp', 'cpp_seeder/cdn_disk_interface.hpp', 'cpp_seeder/libcdn_fetch/src/lib.rs', 'cpp_seeder/libcdn_fetch/Cargo.lock') }}

      - name: Build release
        working-directory: cpp_seeder
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Get external IP
        id: ip
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "external_ip=$IP" >> "$GITHUB_OUTPUT"

      - name: Run seeder
        working-directory: cpp_seeder
        run: |
          echo "========================================"
          echo "  CDN BitTorrent Seeder (C++)"
          echo "  External IP: ${{ steps.ip.outputs.external_ip }}"
          echo "========================================"
          timeout 600 ./build/cdn_seed
